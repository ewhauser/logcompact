version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7
    groups:
      rust-security-updates:
        applies-to: security-updates
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7
    groups:
      github-actions-security-updates:
        applies-to: security-updates
        patterns: ["*"]
