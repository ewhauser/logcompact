name: Release Please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # Creates the release tag and GitHub release.
      pull-requests: write # Updates the managed release pull request.
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - id: release
        uses: googleapis/release-please-action@c2a5a2bd6a758a0937f1ddb1e8950609867ed15c # v4.3.0
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-crates:
    name: publish crates
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
      id-token: write # Authenticates crates.io publication via OIDC.
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.release.outputs.tag_name }}

  publish-assets:
    name: publish release assets
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: write # Attaches packaged CLIs to the GitHub release.
      attestations: write # Stores Sigstore provenance for release assets.
      id-token: write # Authenticates release attestations via OIDC.
    uses: ./.github/workflows/release-assets.yml
    with:
      tag: ${{ needs.release.outputs.tag_name }}
      upload_url: ${{ needs.release.outputs.upload_url }}
