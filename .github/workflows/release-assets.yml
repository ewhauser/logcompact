name: Release assets

on:
  workflow_call:
    inputs:
      tag:
        description: Exact vX.Y.Z release tag to package
        required: true
        type: string
      upload_url:
        description: Release Please upload URL for the draft release
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: Exact vX.Y.Z tag whose draft release should be completed
        required: true
        type: string

permissions: {}

concurrency:
  group: release-assets-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.tag }}
      - name: Checkout release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.workflow_sha }}
          path: .release-workflow
          sparse-checkout: |
            dist-workspace.toml
            scripts/install-cargo-dist.ps1
            scripts/install-cargo-dist.sh
          sparse-checkout-cone-mode: false
      - name: Apply release packaging configuration
        shell: bash
        run: cp .release-workflow/dist-workspace.toml dist-workspace.toml
      - name: Install Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal
      - name: Install dist
        if: runner.os != 'Windows'
        run: ./.release-workflow/scripts/install-cargo-dist.sh
      - name: Install dist on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.release-workflow/scripts/install-cargo-dist.ps1
      - name: Build release archive
        id: artifacts
        shell: bash
        env:
          CARGO_PROFILE_DIST_INHERITS: release
          RELEASE_TAG: ${{ inputs.tag }}
          DIST_TARGET: ${{ matrix.target }}
        run: |
          dist build \
            --allow-dirty \
            "--tag=$RELEASE_TAG" \
            --print=linkage \
            --output-format=json \
            --artifacts=local \
            "--target=$DIST_TARGET" > dist-manifest.json
          {
            echo "paths<<EOF"
            dist print-upload-files-from-manifest --manifest dist-manifest.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Upload packaged archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.artifacts.outputs.paths }}
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true
      - name: Require release archives
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(artifacts/*)
          if (( ${#artifacts[@]} < 10 )); then
            echo "expected ten release assets, found ${#artifacts[@]}" >&2
            exit 1
          fi
          printf '%s\n' "${artifacts[@]}"
      - name: Resolve draft release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROVIDED_UPLOAD_URL: ${{ inputs.upload_url }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          upload_url="$PROVIDED_UPLOAD_URL"
          if [[ -z "$upload_url" ]]; then
            upload_url="$(
              gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" |
                jq -r --arg tag "$RELEASE_TAG" \
                  '.[] | select(.tag_name == $tag and .draft == true) | .upload_url' |
                head -n 1
            )"
          fi
          upload_url="${upload_url%%\{*}"
          release_id="$(sed -E 's#^.*/releases/([0-9]+)/assets$#\1#' <<< "$upload_url")"
          if [[ -z "$upload_url" || ! "$release_id" =~ ^[0-9]+$ ]]; then
            echo "no draft release found for $RELEASE_TAG" >&2
            exit 1
          fi
          echo "upload_url=$upload_url" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
      - name: Attest release archives
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: artifacts/*
      - name: Attach archives to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          UPLOAD_URL: ${{ steps.release.outputs.upload_url }}
        run: |
          for artifact in artifacts/*; do
            name="$(basename "$artifact")"
            gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" |
              jq -r --arg name "$name" '.[] | select(.name == $name) | .id' |
              while read -r asset_id; do
                gh api --method DELETE \
                  "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
              done
            encoded_name="$(jq -nr --arg name "$name" '$name | @uri')"
            curl --proto '=https' --tlsv1.2 \
              --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --header "Content-Type: application/octet-stream" \
              --data-binary "@$artifact" \
              "$UPLOAD_URL?name=$encoded_name" >/dev/null
          done
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false >/dev/null
