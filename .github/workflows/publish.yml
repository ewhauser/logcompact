name: Publish crates

on:
  workflow_call:
    inputs:
      tag:
        description: Exact vX.Y.Z release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Exact vX.Y.Z release tag to publish
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io
    permissions:
      contents: read
      id-token: write # Obtains a short-lived crates.io credential via OIDC.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.tag }}
      - name: Install Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy,rustfmt
      - name: Verify release inputs
        run: make check && make package-check
      - name: Authenticate with crates.io using OIDC
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish workspace in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: scripts/publish.sh
