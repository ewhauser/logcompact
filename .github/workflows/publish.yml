name: Publish crates

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy,rustfmt
      - name: Verify release inputs
        run: make check && make package-check
      - name: Authenticate with crates.io using OIDC
        id: crates-io-auth
        if: vars.CRATES_IO_TRUSTED_PUBLISHING == 'true'
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish workspace in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: scripts/publish.sh
