name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - name: Install Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy,rustfmt
      - run: cargo fmt --all -- --check
      - run: python3 scripts/check-boundary.py
      - run: python3 scripts/check-release-please-config.py
      - run: python3 scripts/check-workflow-security.py
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Compile benchmarks
        run: cargo bench --workspace --all-features --locked --no-run
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps --locked
      - run: make package-check

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - name: Install Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal
      - run: cargo test --workspace --all-features --locked

  hawk:
    name: dead public API
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - name: Install Hawk Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal
      - name: Install Hawk
        shell: bash
        env:
          HAWK_SHA256: a95e5772f1c853c2cfeeadb96d00ae4c9592312052334d5c642974d1cd436dd9
          HAWK_VERSION: 0.1.8
        run: |
          archive="$RUNNER_TEMP/cargo-hawk.tar.gz"
          install_dir="$RUNNER_TEMP/cargo-hawk"
          curl --proto '=https' --tlsv1.2 \
            --fail --location --silent --show-error \
            "https://github.com/astral-sh/hawk/releases/download/$HAWK_VERSION/cargo-hawk-x86_64-unknown-linux-gnu.tar.gz" \
            --output "$archive"
          echo "$HAWK_SHA256  $archive" | sha256sum --check
          mkdir -p "$install_dir"
          tar --extract --gzip --file "$archive" \
            --directory "$install_dir" --strip-components=1
          echo "$install_dir" >> "$GITHUB_PATH"
      - run: make hawk

  workflow-security:
    name: workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: python3 scripts/check-workflow-security.py
      - name: Audit GitHub Actions supply chain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pipx run --spec zizmor==1.25.2 zizmor .github
