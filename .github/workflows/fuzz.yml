name: Fuzz smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: rustup toolchain install nightly --profile minimal
      - run: rustup run nightly cargo install cargo-fuzz --version 0.13.2 --locked
      - run: rustup run nightly cargo fuzz run logcompact -- -max_total_time=15
