name: Fuzz smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: rustup toolchain install nightly --profile minimal
      - run: rustup run nightly cargo install cargo-fuzz --locked
      - run: rustup run nightly cargo fuzz run tokencompact -- -max_total_time=15
